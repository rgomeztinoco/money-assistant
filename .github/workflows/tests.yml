name: tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies
        # The project-local Sail binary is unavailable until this bootstrap install completes.
        run: composer install --no-interaction --no-progress --no-scripts --prefer-dist

      - name: Configure Application
        run: cp .env.example .env

      - name: Start Sail
        run: vendor/bin/sail up -d --wait

      - name: Setup Application
        run: vendor/bin/sail composer setup

      - name: Run CI Checks
        run: vendor/bin/sail composer ci:check
